<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>{% block title %}Adybros Marketing — Turning Businesses into Leads & Sales Machines{% endblock %}</title>
    <meta name="description" content="{% block description %}Adybros is a performance-driven digital marketing agency. 400+ ads delivered, lakhs spent on campaigns, crores generated in sales.{% endblock %}" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest') }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='1.1') }}">
    
    <!-- Sectional CSS -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="grain" aria-hidden="true"></div>

    {% include 'includes/announcement.html' %}
    {% include 'includes/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    <!-- Global JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <!-- Sectional JS -->
    {% block extra_js %}{% endblock %}
</body>
</html>
